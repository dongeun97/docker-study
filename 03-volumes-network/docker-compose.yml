services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: testdb
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - my-network

  app:
    build: ../01-basics/hello-docker
    ports:
      - "8000:8000"
    networks:
      - my-network

volumes:
  db-data:

networks:
  my-network: